name: Update Stock Price (Naver + Yahoo)

on:
  schedule:
    # UTC 0:00~6:50 = KST 09:00~15:50, 평일 10분마다
    - cron: "*/10 0-6 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-price:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 yfinance

      - name: Fetch domestic prices from Naver Finance
        run: python scripts/fetch_price.py

      - name: Fetch overseas prices from Yahoo Finance
        run: python scripts/fetch_price_overseas.py

      - name: Commit and push if changed
        run: |
          git config user.name "price-bot"
          git config user.email "actions@users.noreply.github.com"
          git add price.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update price $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git pull --rebase origin main
            git push
          else
            echo "no changes"
          fi
